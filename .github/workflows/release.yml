name: Release Pipeline

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Multi-Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false

      - name: Run golangci-lint
        id: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: 1.64.0
          skip-cache: true

      - name: Run Unit Tests
        id: run-tests
        run: |
          set -o pipefail
          go test -v ./... | tee test_output.txt

      - name: Add Quality Gate Summary
        if: always()
        run: |
          echo "## 🛡️ Summary de Qualidade (Quality Gate)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.golangci-lint.outcome }}" == "success" ]; then
            echo "- ✅ **golangci-lint**: 0 problemas identificados" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **golangci-lint**: Falha no linting" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "- ✅ **Testes Unitários**: Todos os pacotes validados" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Testes Unitários**: Falha nos testes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install System Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libfuse2 flatpak flatpak-builder
          sudo snap install snapcraft --classic
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Run GoReleaser (deb, rpm, tar.gz, snap, binaries)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> 2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AppImage and Flatpak
        run: |
          chmod +x scripts/build-appimage.sh scripts/build-flatpak.sh
          ./scripts/build-appimage.sh
          ./scripts/build-flatpak.sh

      - name: Upload AppImage and Flatpak to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.AppImage
            dist/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
