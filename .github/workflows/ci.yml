name: CI Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Code Analysis (Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false

      - name: Run golangci-lint
        id: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: 1.64.0
          skip-cache: true

      - name: Add Lint Job Summary
        if: always()
        run: |
          echo "## 🔍 Análise Estática de Código (Lint)" >> $GITHUB_STEP_SUMMARY
          echo "| Ferramenta | Status | Detalhes |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.golangci-lint.outcome }}" == "success" ]; then
            echo "| \`golangci-lint\` | ✅ **Aprovado** | 0 problemas ou code smells identificados |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| \`golangci-lint\` | ❌ **Falhou** | Foram detectados avisos ou erros de linting |" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false

      - name: Run Unit Tests
        id: run-tests
        run: |
          set -o pipefail
          go test -v ./... | tee test_output.txt

      - name: Add Test Job Summary
        if: always()
        run: |
          echo "## 🧪 Relatório da Suíte de Testes Unitários" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "### Status: ✅ **Todos os testes passaram com sucesso!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Status: ❌ **Houve falha na execução dos testes**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pacote | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          grep -E "^(ok|FAIL)" test_output.txt | while read -r line; do
            pkg=$(echo "$line" | awk '{print $2}')
            status=$(echo "$line" | awk '{print $1}')
            duration=$(echo "$line" | awk '{print $3}')
            if [ "$status" == "ok" ]; then
              echo "| \`$pkg\` | ✅ OK ($duration) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$pkg\` | ❌ FALHOU |" >> $GITHUB_STEP_SUMMARY
            fi
          done
