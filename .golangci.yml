version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
  settings:
    revive:
      rules:
        - name: unused-parameter
        - name: indent-error-flow
  exclusions:
    rules:
      - linters:
          - errcheck
        text: "Error return value of .*(Close|RemoveAll).* is not checked"
      - linters:
          - staticcheck
        text: "(QF1003|ST1005)"
